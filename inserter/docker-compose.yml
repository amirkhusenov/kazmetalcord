version: '3.8'

services:
  mongodb:
    image: mongo:8.2.3-noble
    container_name: kazmetalcord-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: kazmetalcord
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - kazmetalcord-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  kazmetalcord-network:
    driver: bridge
